<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Primordial Data — Entrar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/static/style.css">
<style>
  body { background: linear-gradient(160deg, hsl(210, 78%, 96%), hsl(168, 76%, 96%)); min-height: 100vh; display:flex; align-items:center; justify-content:center; font-family: Inter, system-ui, sans-serif; margin:0; padding:1rem; }
  .login-card { width: 100%; max-width: 380px; background:#fff; border:1px solid hsl(214,32%,91%); border-radius: .9rem; padding: 2rem 1.75rem; box-shadow: 0 12px 32px hsla(210,78%,30%,.08); }
  .login-brand { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; }
  .login-brand-icon { width:48px; height:48px; border-radius:.7rem; background:linear-gradient(135deg, hsl(210,78%,46%), hsl(168,76%,42%)); display:flex; align-items:center; justify-content:center; padding:6px; box-shadow:0 4px 12px hsla(210,78%,30%,.18); }
  .login-brand-icon img { width:100%; height:100%; object-fit:contain; display:block; }
  .login-title { font-size:1.05rem; font-weight:700; color:hsl(222,47%,11%); }
  .login-subtitle { font-size:.78rem; color:hsl(215,16%,45%); }
  .field { margin-bottom: .9rem; }
  .field label { display:block; font-size:.78rem; font-weight:600; color:hsl(222,47%,20%); margin-bottom:.35rem; }
  .field input { width:100%; padding:.65rem .8rem; border:1px solid hsl(214,32%,88%); border-radius:.55rem; font-size:.92rem; outline:none; transition:border-color 120ms, box-shadow 120ms; box-sizing:border-box; }
  .field input:focus { border-color: hsl(210,78%,55%); box-shadow: 0 0 0 3px hsla(210,78%,55%,.15); }
  .btn-login { width:100%; padding:.75rem; background: hsl(210,78%,46%); color:#fff; border:none; border-radius:.55rem; font-size:.95rem; font-weight:600; cursor:pointer; transition: background 120ms; }
  .btn-login:hover { background: hsl(210,78%,40%); }
  .btn-login:disabled { opacity:.6; cursor:not-allowed; }
  .err { background: hsl(0,84%,96%); color: hsl(0,72%,42%); border:1px solid hsl(0,84%,88%); border-radius:.5rem; padding:.55rem .7rem; font-size:.82rem; margin-bottom:.9rem; display:none; }
  .lgpd-note { font-size:.7rem; color:hsl(215,16%,55%); margin-top:1.25rem; line-height:1.45; text-align:center; }
</style>
</head>
<body>
  <form class="login-card" id="loginForm" autocomplete="on">
    <div class="login-brand">
      <div class="login-brand-icon"><img src="/static/img/logo.png" alt="PrimoDATA"></div>
      <div>
        <div class="login-title">Primordial Data</div>
        <div class="login-subtitle">Inteligência Clínica</div>
      </div>
    </div>
    <div class="err" id="err"></div>
    <div class="field">
      <label for="username">Usuário</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn-login" type="submit" id="btnLogin">Entrar</button>
    <p class="lgpd-note">Acesso restrito à equipe clínica autorizada.<br>Os dados aqui exibidos são protegidos pela LGPD.</p>
  </form>
<script>
const form = document.getElementById('loginForm');
const errBox = document.getElementById('err');
const btn = document.getElementById('btnLogin');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errBox.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      errBox.textContent = d.detail || 'Falha ao entrar.';
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Entrar';
      return;
    }
    window.location.href = '/';
  } catch (err) {
    errBox.textContent = 'Erro de conexão.';
    errBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
